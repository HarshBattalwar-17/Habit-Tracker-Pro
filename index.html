<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:'Inter', sans-serif;
}

body{
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  min-height:100vh;
}

/* MAIN CONTAINER */
.container{
  width:95%;
  max-width:1200px;
  margin:20px auto;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* TOP BAR */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

#user{
  font-size:14px;
  font-weight:600;
}

.actions button{
  margin-left:6px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.actions button:hover{
  background:#4338ca;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
  flex-wrap:wrap;
}

.title{
  font-size:22px;
  font-weight:600;
}

/* MONTHS */
.months{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.month{
  padding:6px 10px;
  font-size:12px;
  border-radius:8px;
  background:#eef2ff;
  cursor:pointer;
  transition:0.3s;
}

.month:hover{
  background:#c7d2fe;
}

.active{
  background:#4f46e5;
  color:white;
}

/* TABLE */
.table-wrapper{
  overflow-x:auto;
  margin-top:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

th,td{
  border:1px solid #e5e7eb;
  text-align:center;
  width:30px;
  height:30px;
  font-size:11px;
}

th{
  background:#4f46e5;
  color:white;
  position:sticky;
  top:0;
}

.habit-col{
  width:160px;
  text-align:left;
  padding-left:8px;
  background:#f9fafb;
  font-size:12px;
  font-weight:500;
}

.cell{
  cursor:pointer;
  transition:0.2s;
}

.cell:hover{
  background:#e0e7ff;
}

.checked{
  background:#22c55e !important;
}

/* LOGIN */
.login{
  max-width:320px;
  margin:120px auto;
  background:white;
  padding:25px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.login h2{
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  font-size:13px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#4338ca;
}

.error{
  color:red;
  font-size:12px;
  margin-top:5px;
}

/* MOBILE RESPONSIVE */
@media(max-width:600px){
  .title{
    font-size:18px;
  }

  .habit-col{
    width:120px;
    font-size:10px;
  }

  th,td{
    width:25px;
    height:25px;
    font-size:9px;
  }
}
</style>
</head>

<body>

<div id="login" class="login">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password (min 8)">
  <button onclick="register()">Register</button>
  <button onclick="loginUser()">Login</button>
  <div id="error" class="error"></div>
</div>

<div id="app" style="display:none;">
<div class="container">

<div class="top-bar">
  <div id="user"></div>
  <div class="actions">
    <button onclick="resetData()">Reset</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>
<br>
<div class="header">
  <div class="title">Habit Tracker</div>
  <div class="months" id="monthsBar"></div>
</div>
<br>
<div class="table-wrapper">
<table>
<thead>
<tr id="daysRow">
<th class="habit-col">Habit</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>
</div>

<script>
const months = [
  {name:"Jan", days:31},
  {name:"Feb", days:28},
  {name:"Mar", days:31},
  {name:"Apr", days:30},
  {name:"May", days:31},
  {name:"Jun", days:30},
  {name:"Jul", days:31},
  {name:"Aug", days:31},
  {name:"Sep", days:30},
  {name:"Oct", days:31},
  {name:"Nov", days:30},
  {name:"Dec", days:31}
];

let selectedMonth = new Date().getMonth();
let DAYS = months[selectedMonth].days;
const HABITS = 10;

let currentUser = localStorage.getItem("currentUser_ht");

/* MONTH UI */
function renderMonths(){
  const bar = document.getElementById("monthsBar");
  bar.innerHTML = "";

  months.forEach((m, i)=>{
    const div = document.createElement("div");
    div.className = "month";
    if(i === selectedMonth) div.classList.add("active");

    div.innerText = m.name;
    div.onclick = ()=>{
      selectedMonth = i;
      DAYS = m.days;
      renderApp();
    };

    bar.appendChild(div);
  });
}

/* TABLE */
function renderTable(){
  const head = document.getElementById("daysRow");
  const body = document.getElementById("tableBody");

  head.innerHTML = '<th class="habit-col">Habit</th>';
  body.innerHTML = "";

  for(let d=1; d<=DAYS; d++){
    let th = document.createElement("th");
    th.innerText = d;
    head.appendChild(th);
  }

  let data = JSON.parse(localStorage.getItem("data_"+currentUser)) || {};

  for(let h=0; h<HABITS; h++){
    let tr = document.createElement("tr");

    let name = document.createElement("td");
    name.className = "habit-col";
    name.contentEditable = true;
    name.innerText = data[`name_${h}`] || "";
    name.oninput = ()=>{
      data[`name_${h}`] = name.innerText;
      save();
    };

    tr.appendChild(name);

    for(let d=1; d<=DAYS; d++){
      let td = document.createElement("td");
      td.className = "cell";

      let key = `h${h}d${d}m${selectedMonth}`;

      if(data[key]) td.classList.add("checked");

      td.onclick = ()=>{
        td.classList.toggle("checked");
        data[key] = td.classList.contains("checked");
        save();
      };

      tr.appendChild(td);
    }

    body.appendChild(tr);
  }

  function save(){
    localStorage.setItem("data_"+currentUser, JSON.stringify(data));
  }
}

/* MAIN */
function renderApp(){
  renderMonths();
  renderTable();
}

/* AUTH */
function register(){
  let user=username.value.trim();
  let pass=password.value;

  if(pass.length<8) return error.innerText="Min 8 chars";

  let users=JSON.parse(localStorage.getItem("users_ht"))||{};
  if(users[user]) return error.innerText="User exists";

  users[user]=pass;
  localStorage.setItem("users_ht",JSON.stringify(users));
  error.innerText="Registered";
}

function loginUser(){
  let user=username.value.trim();
  let pass=password.value;

  let users=JSON.parse(localStorage.getItem("users_ht"))||{};

  if(users[user]===pass){
    localStorage.setItem("currentUser_ht",user);
    location.reload();
  } else error.innerText="Invalid";
}

function logout(){
  localStorage.removeItem("currentUser_ht");
  location.reload();
}

function resetData(){
  if(confirm("Reset all data?")){
    localStorage.removeItem("data_"+currentUser);
    location.reload();
  }
}

/* INIT */
if(currentUser){
  login.style.display="none";
  app.style.display="block";
  user.innerText="👤 "+currentUser;

  renderApp();
}
</script>

</body>
</html>
